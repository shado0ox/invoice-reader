services:
  - type: web
    name: invoice-extractor
    env: python
    buildCommand: |
      pip install -r requirements.txt
      apt-get install -y tesseract-ocr tesseract-ocr-ara libzbar0
    startCommand: gunicorn app:app --workers 2 --timeout 120 --bind 0.0.0.0:$PORT
    envVars:
      - key: FLASK_DEBUG
        value: false
    plan: free
